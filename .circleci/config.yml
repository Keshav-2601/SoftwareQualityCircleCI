version: 2.1

jobs:
  build:
    docker:
      - image: cimg/openjdk:24.0
    steps:
      - checkout
      - run:
          name: Check Java version
          command: java --version
      - run:
          name: Check Maven version
          command: mvn -version
      - run:
          name: Run tests
          command: mvn test
      - store_test_results:
          path: target/surefire-reports

workflows:
  version: 2
  build_and_test:
    jobs:
      - build